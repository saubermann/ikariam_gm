<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Piracy API Demo</title>
    <!-- jQuery (used for the REST call) -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" crossorigin="anonymous"></script>
    <!-- Tabulator CSS -->
    <link href="https://unpkg.com/tabulator-tables@5.5.0/dist/css/tabulator.min.css" rel="stylesheet" />
    <!-- Tabulator JS -->
    <script src="https://unpkg.com/tabulator-tables@5.5.0/dist/js/tabulator.min.js"></script>
    <style>
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        padding: 1.5rem;
        /* max-width: 700px; */
        margin: 0 auto;
      }
      button {
        padding: 0.5rem 1rem;
        font-size: 1rem;
        cursor: pointer;
      }
      #result {
        margin-top: 1rem;
        padding: 1rem;
        border: 1px solid #ccc;
        border-radius: 6px;
        background: #fafafa;
        white-space: pre-wrap;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      }
      #scoresTable {
        width: 100%;
        border-collapse: collapse;
      }
      #scoresTable td {
        vertical-align: top;
        padding: 10px;
      }
      .nested-table {
        width: 100% !important;
      }

      /* DNW, KNW */
      .ally-76, .ally-78 {
        background-color: #ffe6e6 !important;
      }
      /* WAR */
      .ally-1 {
        background-color: #cce7ff !important;
      }
      /* B-P */
      .ally-70 {
        background-color: #e6ffe6 !important;
      }
      /* Support Accounts */
      .support-account {
        background-color: #e6e6b3 !important;
        font-style: italic;
      }
    </style>
  </head>
  <body>
    <h1>Piracy Scores</h1>

    <button id="fetchScoresBtn" type="button">Fetch Scores</button>

    <div style="margin-top: 1rem;">
      <label for="userName">User Name:</label>
      <input type="text" id="userName" style="margin-left: 0.5rem; padding: 0.25rem;" />
    </div>

  <div id="filters" style="margin-top: 1rem; display: none;">
    <label><input type="checkbox" id="ignorePiracyFilter" checked> Ignore blocked accounts</label>
  </div>

    <div id="tableControls" style="margin-top: 1rem; display:none;">
      <label>
        Filter all fields:
        <input type="text" id="globalFilter" placeholder="Search dataset..." style="width: 240px; margin: 0 8px;" />
      </label>
      <button id="clearFilterBtn" type="button">Clear</button>
    </div>

    <div id="tablesContainer" style="margin-top: 1rem; display:none;"></div>

    <div id="result" aria-live="polite">Click the button to call the REST API.</div>

    <script>
      $(function() {
        var table;
        var $result = $("#result");

        var $userName = $("#userName");
        $userName.val(localStorage.getItem('ikariam.userName') || '');
        $userName.on('input', function() {
          localStorage.setItem('ikariam.userName', $(this).val());
        });

        function showResult(text) {
          $result.show().text(text);
        }

        function showError(error) {
          var message = "Error fetching scores: " + (error && error.statusText ? error.statusText : error);
          showResult(message);
        }

        function formatNumber(num) {
          if (num === null || num === undefined || num === "") {
            return "";
          }
          var numeric = Number(num);
          if (isNaN(numeric)) {
            return String(num);
          }
          return numeric.toLocaleString('de-DE');
        }

        function flattenData(source) {
          var rows = [];
          source.forEach(function(group) {
            if (!Array.isArray(group) || group.length === 0) {
              return;
            }
            var date = group[0].date || "";
            group.forEach(function(item) {
              rows.push({
                date: date,
                place: item.place != null ? Number(item.place) : null,
                capture_points: item.capture_points != null ? Number(item.capture_points) : null,
                points: item.capture_points != null ? formatNumber(item.capture_points) : "",
                user: item.user || "",
                city: item.city || "",
                island: item.island || "",
                userLink: item.userId ? 'https://s74-de.ikariam.gameforge.com/?view=avatarProfile&avatarId=' + item.userId : "",
                cityLink: item.cityId ? 'https://s74-de.ikariam.gameforge.com/?view=island&cityId=' + item.cityId : "",
                islandLink: item.islandId ? 'https://s74-de.ikariam.gameforge.com/?view=island&islandId=' + item.islandId : "",
                allyId: item.allyId || "",
                ignore_piracy: !!item.ignore_piracy,
                support: !!item.isSupportAccount,
                captured_by: item.captured_by || "",
                sys_id: item.sys_id || ""
              });
            });
          });
          return rows;
        }

        var tableInstances = [];

        function createTableForGroup(groupDate, rows, index) {
          var tableId = 'groupTable_' + index;
          var tableLabelId = 'groupLabel_' + index;

          var $groupHeader = $('<div style="margin-top:1.5rem; font-weight:bold;">').attr('id', tableLabelId).text('Date: ' + groupDate + ' (' + rows.length + ' rows)');
          var $tableDiv = $('<div>').attr('id', tableId).css('margin-bottom', '1rem');

          $('#tablesContainer').append($groupHeader).append($tableDiv);

          var groupTable = new Tabulator('#' + tableId, {
            data: rows,
            layout: 'fitColumns',
            height: '320px',
            columns: [
              { title: 'Place', field: 'place', sorter: 'number', hozAlign: 'right', width: 80 },
              { title: 'Points', field: 'capture_points', sorter: 'number', hozAlign: 'right', formatter: function(cell){ return formatNumber(cell.getValue()); } },
              { title: 'User', field: 'user', sorter: 'string', formatter: function(cell){ var value = cell.getValue(); var link = cell.getData().userLink; return link ? '<a target="_blank" href="'+link+'">'+value+'</a>' : value; } },
              { title: 'City', field: 'city', sorter: 'string', formatter: function(cell){ var value = cell.getValue(); var link = cell.getData().cityLink; return link ? '<a target="_blank" href="'+link+'">'+value+'</a>' : value; } },
              { title: 'Island', field: 'island', sorter: 'string', formatter: function(cell){ var value = cell.getValue(); var link = cell.getData().islandLink; return link ? '<a target="_blank" href="'+link+'">'+value+'</a>' : value; } },
              /*{ title: 'Ally ID', field: 'allyId', sorter: 'number', hozAlign: 'center', width: 80 },*/
              { title: 'Ignored', field: 'ignore_piracy', sorter: 'boolean', formatter: 'tickCross', hozAlign: 'center', width: 90 },
              { title: 'Captured By', field: 'captured_by', sorter: 'string', formatter: function(cell){ var data = cell.getData(); if (data.captured_by) { return data.captured_by; } else { return '<input type="checkbox" class="mark-complete" data-sys-id="' + data.sys_id + '" />'; } }, hozAlign: 'center', width: 120 }
            ],
            rowFormatter: function(row) {
              var data = row.getData();
              if (data.allyId) {
                row.getElement().classList.add('ally-' + data.allyId);
              }
              if (data.support) {
                row.getElement().classList.add('support-account');
              }
            }
          });

          groupTable.on('renderComplete', function(){
            $('#' + tableId + ' input.mark-complete').on('change', function(){
              var sysId = $(this).data('sys-id');
              var userName = $userName.val().trim();
              if (!userName) {
                alert('Please enter a user name.');
                return;
              }
              $.ajax({
                url: 'https://mediasolutionsdemo6.service-now.com/api/x_29168_ikariam/piracy/markComplete',
                method: 'POST',
                data: JSON.stringify({ sys_id: sysId, captured_by: userName }),
                contentType: 'application/json',
                dataType: "json",
                success: function(response) {
                  alert(response.result.statusText);
                  // Optionally update the row or show success
                  $(this).prop('disabled', true).html(' ' + userName);
                }.bind(this),
                error: function(response) {
                  alert('Error marking complete.' + (response && response.result.statusText ? response.result.statusText : ''));
                }
              });
            });
          });

          return groupTable;
        }

        function refreshFilters() {
          var query = $("#globalFilter").val().trim().toLowerCase();
          var ignorePiracy = $("#ignorePiracyFilter").is(":checked");

          tableInstances.forEach(function(table) {
            table.setFilter(function(data) {
              if (ignorePiracy && data.ignore_piracy) {
                return false;
              }
              if (!query) {
                return true;
              }

              return Object.keys(data).some(function(key) {
                var value = data[key];
                if (value === undefined || value === null) return false;
                return String(value).toLowerCase().indexOf(query) > -1;
              });
            });
          });
        }

        $("#globalFilter").on("input", refreshFilters);

        $("#clearFilterBtn").on("click", function () {
          $("#globalFilter").val("");
          refreshFilters();
        });

        $("#fetchScoresBtn").on("click", function () {
          showResult("Loading...");

          var urlParams = new URLSearchParams(window.location.search);
          var apiUrl = urlParams.get('debug') === 'true' ? 'piracy_score.json' : 'https://mediasolutionsdemo6.service-now.com/api/x_29168_ikariam/piracy/getScores';

          $.ajax({
            url: apiUrl,
            method: "GET",
            dataType: "json",
            success: function (data) {
              var sourceData = data.result || [];

              var nonEmptyGroups = sourceData.filter(function(group) {
                return Array.isArray(group) && group.length > 0;
              });

              if (nonEmptyGroups.length === 0) {
                showResult("No data returned from API.");
                return;
              }

              $("#result").hide();
              $("#tablesContainer").empty().show();
              $("#tableControls").show();
              $("#filters").show();

              tableInstances.forEach(function(t) { t.destroy(); });
              tableInstances = [];

              nonEmptyGroups.forEach(function(group, index) {
                var groupRows = flattenData([group]);
                var groupDate = group[0] ? group[0].date : ('Group ' + (index + 1));
                var table = createTableForGroup(groupDate, groupRows, index);
                tableInstances.push(table);
              });

              refreshFilters();
            },
            error: function (jqXHR, textStatus, errorThrown) {
              showError(jqXHR && jqXHR.responseText ? jqXHR.responseText : textStatus || errorThrown);
            }
          });
        });

        $("#ignorePiracyFilter").on("change", refreshFilters);
      });
    </script>
  </body>
</html>
